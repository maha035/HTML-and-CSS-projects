<!DOCTYPE html>
<html>
<head>
  <title>lets practice html</title>
  <link rel="stylesheet" href="product-pricingtable.css">
  <meta charset="UTF-8">
  <meta name="viewport" 
  content="width=device-width, initial-scale=1">
  <meta name="description" content="website of practice">
  <meta name="keywords" content="HTML , CSS , JAVASCRIPT">
  <meta name="author" content="maha">

</head>
<body>
   <div class="price-container">
    <div class="price-card">
        <h3>Basic</h3>
        <div class="price">$9 <span>/mon</span>
        </div>
        <ul>
            <li>1 user</li>
            <li>10GB storage</li>
            <li>Email support</li>
        </ul>
        <button>get started</button>
    </div>

    <div class="price-card popular">
       <div class="badge">most popular</div>
       <h3>pro</h3>
       <div class="price">25$ <span>/mo</span></div>
       <ul>
        <li>10 users</li>
        <li> 500gb storage</li>
        <li>24/7 priority support</li>
       </ul>
       <button>getting started</button>
    </div>
    <div class="price-card">
        <h3>enterprice</h3>
        <div class="price">$99 <span>/mo</span></div>
        <ul>
            <li>unlimited users</li>
            <li>1tb storage</li>
            <li>dedicated users</li>
        </ul>
        <button>contact us</button>
    </div>

   </div>
    
</div>

</body>
</html>
