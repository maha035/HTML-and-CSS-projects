<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Card with Images</title>
    <link rel="stylesheet" href="recipe-card.css">
</head>
<body>
    <div class="recipe-card">
        
        <div class="recipe-img"></div>

        <div class="recipe-content">
            <span class="recipe-tag">Dessert</span>
            <h2>Classic Chocolate Brownies</h2>
            <p>Rich, fudgy, and packed with deep chocolate flavor. The perfect weekend baking project.</p>
        </div>


        <div class="recipe-meta">
            <span>⏱ 35 mins</span>
            <span>🔥 240 kcal</span>
        </div>
    </div>
    
</body>
</html>
