<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Card with Images</title>
    <link rel="stylesheet" href="recipe-card.css">
</head>
<body>
    <div class="recipe-container">
        <div class="recipe-img">

        </div>
        <div class="recipe-content">
            <div class="recipe-tag">dessert</div>
            <h2>chockolate brownies</h2>
            <p>A creamy , fluffy with deep chockolate browny with 
                hot deep softness
            </p>
        </div>
        <div class="recipe-meta">
            <span>⏱ 35 mins</span>
            <span>🔥 240 kcal</span>
        </div>
    </div>
    
</body>
</html>
