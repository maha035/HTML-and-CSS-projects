<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>responsive data table</title>
    <link rel="stylesheet" href="data-table.css">
</head>
<body>
     <table class="responsive-table">
        <thead>
            <tr>
                <th>User</th>
                <th>ID</th>
            </tr>
        </thead>
        <tbody>
            <td data-label="ID">#0001</td>
            <td data-label="user">Alice</td>
        </tbody>
     </table>
</body>
</html>
