<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>modal pop up</title>
    <link rel="stylesheet" href="modal-popup.css">
</head>
<body>
   <a href="#demo-modal" class="modal-open-btn">Open Modal</a> 
   <div id="demo-modal" class="modal-wrapper" >
    <div class="modal-body">
        <h3>modal box</h3>
        <p>This box is triggered entirely via the CSS :target selector query!</p>
        <a href="#" class="close-modal-btn">Close Modal</a>
    </div>
   </div>
</body>
</html>
